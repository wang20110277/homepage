# Nginx 配置文件 - 大模型应用平台 (ADFS 单点登录)
# 域名: platform.largeModel.bobcfc.local
# 内网 IP: 10.162.5.210

# 上游服务器配置 - Next.js 应用
upstream nextjs_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP 服务器 - 强制重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name platform.largeModel.bobcfc.local;

    # 日志配置
    access_log /var/log/nginx/platform_http_access.log;
    error_log /var/log/nginx/platform_http_error.log warn;

    # 重定向所有 HTTP 请求到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器 - 主配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name platform.largeModel.bobcfc.local;

    # 根目录（用于 Let's Encrypt 验证等，如果不需要可以注释掉）
    root /var/www/html;

    # SSL 证书配置
    # 请根据实际证书路径修改以下配置
    ssl_certificate /etc/ssl/certs/platform.largeModel.bobcfc.local.crt;
    ssl_certificate_key /etc/ssl/private/platform.largeModel.bobcfc.local.key;

    # SSL 协议和加密套件配置（推荐配置）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL 会话缓存
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling（可选，需要证书支持）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/ssl/certs/ca-chain.crt;

    # 客户端最大上传大小（根据需要调整）
    client_max_body_size 100M;

    # 日志配置
    access_log /var/log/nginx/platform_https_access.log;
    error_log /var/log/nginx/platform_https_error.log warn;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";
    gzip_min_length 1000;

    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 内网环境可以放宽 CSP，根据需要调整
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

    # HSTS（HTTP Strict Transport Security）- 可选，仅在确保 HTTPS 完全配置后启用
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js 静态资源缓存（_next/static 是不可变的）
    location /_next/static/ {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;

        # 长期缓存策略（静态资源包含哈希值，可以安全缓存）
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js 公共资源缓存
    location /images/ {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;

        # 中期缓存策略
        expires 7d;
        add_header Cache-Control "public, max-age=604800";

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Favicon 缓存
    location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml) {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;

        expires 7d;
        add_header Cache-Control "public, max-age=604800";

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
    }

    # API 路由（不缓存）
    location /api/ {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;

        # 禁用缓存
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";

        # WebSocket 支持（用于 HMR 热重载等）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置（API 可能需要较长时间）
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 所有其他请求
    location / {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;

        # WebSocket 支持（用于 Next.js 开发服务器的热重载）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 健康检查端点（可选）
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
